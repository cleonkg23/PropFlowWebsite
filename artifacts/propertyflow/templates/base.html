<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}PropertyFlow{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --pf-bg: #f7f3ea;
      --pf-card: #f2ede4;
      --pf-card-hover: #efe8db;
      --pf-border: #ece4d3;
      --pf-border-strong: #ddd2bb;
      --pf-ink: #2b2a26;
      --pf-ink-soft: #5b5a54;
      --pf-ink-muted: #8a8880;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--pf-bg);
      color: var(--pf-ink);
      letter-spacing: -0.005em;
    }
    h1, h2, h3 { color: var(--pf-ink); letter-spacing: -0.015em; }
    .card {
      background: var(--pf-card);
      border: 1px solid var(--pf-border);
      border-radius: 1rem;
      box-shadow: 0 1px 2px rgba(43, 42, 38, 0.025);
    }
    .card-hover { transition: background-color 140ms ease, box-shadow 140ms ease, transform 140ms ease; }
    .card-hover:hover { background: var(--pf-card-hover); box-shadow: 0 2px 8px rgba(43, 42, 38, 0.05); }
    .badge { @apply inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium; }
    .btn {
      @apply inline-flex items-center px-3.5 py-2 rounded-xl text-sm font-medium;
      background: #fbf8f1;
      border: 1px solid var(--pf-border);
      color: var(--pf-ink);
      transition: background-color 140ms ease, border-color 140ms ease;
    }
    .btn:hover { background: var(--pf-card-hover); border-color: var(--pf-border-strong); }
    .btn-primary {
      @apply inline-flex items-center px-3.5 py-2 rounded-xl text-sm font-medium;
      background: #2b2a26;
      color: #f7f3ea;
      border: 1px solid #2b2a26;
      transition: background-color 140ms ease;
    }
    .btn-primary:hover { background: #3a3933; }
    .btn-ghost {
      @apply inline-flex items-center px-3 py-2 rounded-xl text-sm font-medium;
      background: transparent;
      border: 1px solid transparent;
      color: var(--pf-ink-soft);
      transition: background-color 140ms ease, color 140ms ease;
    }
    .btn-ghost:hover { background: var(--pf-card); color: var(--pf-ink); }
    .field {
      background: #fbf8f1;
      border: 1px solid var(--pf-border);
      color: var(--pf-ink);
      border-radius: 0.875rem;
    }
    .field:focus { outline: none; border-color: var(--pf-border-strong); box-shadow: 0 0 0 3px rgba(216, 202, 168, 0.25); }
    .row-divide > * + * { border-top: 1px solid var(--pf-border); }
    .pill-soft-red { background: #f3dad3; color: #8a3522; }
    .pill-soft-amber { background: #f0e3c4; color: #7a5413; }
    .pill-soft-green { background: #dde7d6; color: #3f5b34; }
    .pill-soft-neutral { background: #e8e2d3; color: #5b5a54; }
    .pill-soft-blue { background: #d9e3e6; color: #2c5363; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 9999px; }
    .dot-new { background: #b9ac90; }
    .dot-progress { background: #c98a2b; }
    .dot-await { background: #2c5363; }
    .dot-done { background: #2f6b53; }
    .scroll-soft { scrollbar-width: thin; scrollbar-color: var(--pf-border-strong) transparent; }
    .scroll-soft::-webkit-scrollbar { width: 8px; }
    .scroll-soft::-webkit-scrollbar-thumb { background: var(--pf-border-strong); border-radius: 9999px; }
  </style>
</head>
<body class="min-h-screen">
  {% include "_components/nav.html" ignore missing %}
  <main class="max-w-7xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
