{% set page = page|default('') %}
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="/">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Property Workflow Co.</span>
      {% if tenant %}<span class="brand-suffix">{{ tenant.name }}</span>{% endif %}
    </a>

    {% if user %}
      <nav class="header-nav" aria-label="Primary">
        <a href="/dashboard" class="{{ 'is-active' if page == 'dashboard' else '' }}">Today</a>
        {% if user.role.value in ['admin', 'owner'] %}
          <a href="/admin" class="{{ 'is-active' if page == 'admin' else '' }}">Admin</a>
        {% endif %}
        {% if user.role.value == 'owner' %}
          <a href="/owner" class="{{ 'is-active' if page == 'owner' else '' }}">Owner</a>
        {% endif %}
      </nav>
      <div class="header-meta">
        <span><b>{{ user.name }}</b></span>
        <span class="role-tag">{{ user.role.value }}</span>
        <form method="post" action="/logout" style="display:inline;">
          <button class="btn-ghost btn-sm" type="submit">Sign out</button>
        </form>
      </div>
    {% endif %}
  </div>
</header>
